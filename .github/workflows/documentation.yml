name: Documentation3

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    tags:
      - "*"
    branches: [ main, master ]

jobs:
  build:
    name: Build and publish documentation
    runs-on: ubuntu-latest

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install Docs Dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y doxygen
            pip install jinja2 Pygments

        - name: Prepare
          run: make prepare

        - name: Configure CMake
          # Nutze die moderne Syntax -S (Source) und -B (Build)
          run: cmake -S . -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE="Debug"

        - name: Building Documentation
          run: cmake --build build --config Debug --target docs -j$(nproc)

        # SCHRITT 1: Das HTML-Verzeichnis für GitHub Pages "verpacken"

        - name: Debug
          run: |
            echo "Suche nach html Ordner..."
            find . -name "index.html"
        - name: Upload Pages Artifact
          uses: actions/upload-pages-artifact@v3
          with:
            # WICHTIG: Prüfe, ob deine Doku wirklich hier liegt:
            path: ./build/docs/html 

        # SCHRITT 2: Das offizielle Deployment triggern
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
