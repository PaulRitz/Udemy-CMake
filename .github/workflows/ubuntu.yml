name: Ubuntu CI Test

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov g++ # lcov ist kritisch für die Coverage-Targets
        pip install --user -U gcovr

    - name: prepare
      run: make prepare || true

    - name: configure
      # Moderne Syntax: -S . statt -H.
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=On

    - name: building and testing
      run: |
        # Erst bauen, dann Coverage-Target ausführen
        cmake --build build --config Debug -j$(nproc)
        cmake --build build --target coverage
        
    - name: run ctest
      working-directory: build
      run: ctest .

    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        # Stelle sicher, dass dein CMake-Skript das XML genau hierhin schreibt:
        filename: build/coverage/coverage.cobertura.xml
        badge: true
        fail_below_min: false # Erst auf false zum Testen, sonst bricht CI bei < 60% ab
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md